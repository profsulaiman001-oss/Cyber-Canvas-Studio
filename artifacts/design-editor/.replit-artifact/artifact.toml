kind = "web"
previewPath = "/"
title = "Cyber-Studio Design Editor"
version = "1.0.0"
id = "artifacts/design-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21209

[services.development]
run = "pnpm --filter @workspace/design-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/design-editor", "run", "build" ]
publicDir = "artifacts/design-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21209"
BASE_PATH = "/"
